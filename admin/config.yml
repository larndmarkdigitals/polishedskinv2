# ============================================================
# Sveltia CMS configuration for Polished Skin.
# (Sveltia is Decap/Netlify-CMS compatible, so this config format is standard.)
#
# CHECK IT OUT NOW (local mode, no login, no GitHub needed):
#   1. Serve this folder over http://localhost (e.g. python3 -m http.server 8000).
#   2. Open http://localhost:8000/admin/ in a CHROMIUM browser
#      (Chrome, Edge, Brave, or Arc — not Safari/Firefox for local mode).
#   3. Click "Work with Local Repository" and choose the `polishedskinv2` folder.
#   4. Edit away — Save writes straight to the content/*.json files.
#
# GO LIVE FOR THE CLIENT (later):
#   - Put the repo on GitHub and host on Netlify.
#   - Replace OWNER/REPO below with the real repo, then the client logs in with
#     GitHub to publish; saving commits + redeploys automatically.
# ============================================================

backend:
  name: github
  repo: larndmarkdigitals/polishedskinv2
  branch: main

# Lets you edit local files in the browser without GitHub (see notes above).
local_backend: true

# Where photo uploads are saved and how they're referenced in the content.
media_folder: "img"
public_folder: "/img"

# Auto-optimize every uploaded photo, in the browser, before it's saved:
# convert to WebP, cap the longest side at 2048px, ~85% quality, strip EXIF.
# So you can drag in a raw phone photo and it gets compressed automatically.
media_libraries:
  all:
    transformations:
      raster_image:
        format: webp
        quality: 85
        width: 2048
        height: 2048
      svg:
        optimize: true

collections:
  - name: content
    label: "Website Content"
    editor:
      preview: false
    files:
      # ---- Home Page --------------------------------------------------------
      - name: home
        label: "Home Page"
        file: "content/home.json"
        description: "All the text on the home page."
        fields:
          - name: hero
            label: "Hero (top of page)"
            widget: object
            collapsed: true
            fields:
              - { name: pill, label: "Eyebrow pill", widget: string }
              - { name: heading, label: "Headline", widget: string }
              - { name: headingAccent, label: "Headline — script accent", widget: string }
              - { name: lede, label: "Intro paragraph(s)", widget: text, hint: "Leave a blank line between paragraphs." }
              - { name: primaryButton, label: "Primary button", widget: string }
              - { name: secondaryButton, label: "Secondary button", widget: string }
              - { name: trustLine, label: "Trust line", widget: string }
              - { name: badgeRating, label: "Badge rating", widget: string }
              - { name: badgeReviews, label: "Badge reviews", widget: string }
              - { name: badgeNote, label: "Badge note", widget: string }
              - { name: img, label: "Photo (Analisa / clinic — portrait ~4:5)", widget: image, required: false, choose_url: false }
          - name: trustStrip
            label: "Trust strip (4 items)"
            widget: list
            collapsed: true
            summary: "{{fields.top}}"
            fields:
              - { name: top, label: "Top line", widget: string }
              - { name: sub, label: "Sub line", widget: string }
          - name: services
            label: "Services preview"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: headingAccent, label: "Heading — script accent", widget: string }
              - { name: sub, label: "Subtext", widget: text }
              - { name: button, label: "Button", widget: string }
          - name: science
            label: "How it works"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: headingAccent, label: "Heading — script accent", widget: string }
              - { name: body, label: "Body", widget: markdown, buttons: [bold, italic, link], editor_components: [] }
              - { name: button, label: "Button", widget: string }
              - name: steps
                label: "Steps (3)"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: "Title", widget: string }
                  - { name: text, label: "Text", widget: text }
          - name: results
            label: "Results / before-after"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: headingAccent, label: "Heading — script accent", widget: string }
              - { name: body, label: "Body", widget: markdown, buttons: [bold, italic, link], editor_components: [] }
              - { name: galleryButton, label: "Gallery button", widget: string }
              - { name: bookButton, label: "Book button", widget: string }
              - { name: beforeImg, label: "Before photo", widget: image, required: false, choose_url: false }
              - { name: afterImg, label: "After photo", widget: image, required: false, choose_url: false }
          - name: about
            label: "About teaser"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: headingAccent, label: "Heading — script accent", widget: string }
              - { name: headingSuffix, label: "Heading — after accent", widget: string }
              - { name: body, label: "Body", widget: markdown, buttons: [bold, italic, link], editor_components: [] }
              - name: chips
                label: "Chips"
                widget: list
                field: { name: chip, label: "Chip", widget: string }
              - { name: button, label: "Button", widget: string }
              - { name: img, label: "Photo (clinic — portrait ~4:5)", widget: image, required: false, choose_url: false }
          - name: reviewsSection
            label: "Reviews preview"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: sub, label: "Subtext", widget: string }
              - { name: button, label: "Button", widget: string }
          - name: why
            label: "Why clients trust us"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - name: cards
                label: "Cards (6)"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: "Title", widget: string }
                  - { name: text, label: "Text", widget: text }
          - name: visit
            label: "Visit section"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: headingAccent, label: "Heading — script accent", widget: string }
              - { name: sub, label: "Subtext", widget: string }
              - { name: hoursTitle, label: "Hours title", widget: string }
              - { name: directionsButton, label: "Directions button", widget: string }
          - name: cta
            label: "Call to action (bottom)"
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: headingAccent, label: "Heading — script accent", widget: string }
              - { name: text, label: "Text", widget: string }
              - { name: button, label: "Button", widget: string }

      # ---- About Page -------------------------------------------------------
      - name: about
        label: "About Page"
        file: "content/about.json"
        description: "Everything on the About page."
        fields:
          - { name: clinicPhoto, label: "Clinic photo (portrait ~4:5)", widget: image, required: false, choose_url: false }
          - name: hero
            label: "Page header"
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: headingAccent, label: "Heading — script accent", widget: string }
              - { name: sub, label: "Subtitle", widget: string }
          - name: clinic
            label: "The clinic (main section)"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: headingAccent, label: "Heading — script accent", widget: string }
              - { name: body, label: "Paragraphs", widget: markdown, buttons: [bold, italic, link], editor_components: [] }
          - name: expect
            label: "What you can expect"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - name: cards
                label: "Cards (3)"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: "Title", widget: string }
                  - { name: text, label: "Text", widget: text }
          - name: esthetician
            label: "The esthetician"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: heading, label: "Heading", widget: string }
              - { name: bio, label: "Bio", widget: markdown, buttons: [bold, italic, link], editor_components: [] }
          - name: cta
            label: "Bottom call-to-action"
            widget: object
            collapsed: true
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: headingAccent, label: "Heading — script accent", widget: string }
              - { name: sub, label: "Subtitle", widget: string }

      # ---- Site & Footer (every page) ---------------------------------------
      - name: site
        label: "Site & Footer"
        file: "content/site.json"
        description: "Business info (hours, address, phone) and footer text — shown on every page."
        fields:
          - name: business
            label: "Business info"
            widget: object
            collapsed: true
            fields:
              - { name: name, label: "Business name", widget: string }
              - { name: addressLine, label: "Street address", widget: string }
              - { name: cityStateZip, label: "City, State ZIP", widget: string }
              - { name: phone, label: "Phone (display)", widget: string }
              - { name: phoneDigits, label: "Phone (digits only, for tap-to-call)", widget: string }
              - name: hours
                label: "Hours"
                widget: list
                summary: "{{fields.day}} — {{fields.time}}"
                fields:
                  - { name: day, label: "Day", widget: string }
                  - { name: time, label: "Hours", widget: string }
                  - { name: closed, label: "Closed?", widget: boolean, default: false }
              - { name: hoursNote, label: "Hours note (footer)", widget: string }
              - { name: closedNote, label: "Closed note (footer)", widget: string }
          - name: footer
            label: "Footer"
            widget: object
            collapsed: true
            fields:
              - { name: blurb, label: "Footer blurb", widget: text }
              - { name: exploreHeading, label: "'Explore' heading", widget: string }
              - { name: visitHeading, label: "'Visit' heading", widget: string }
              - { name: bookLink, label: "Book link text", widget: string }
              - { name: bottomLeft, label: "Bottom-left line", widget: string }
              - { name: bottomRight, label: "Bottom-right line", widget: string }

      # ---- Services & Prices -------------------------------------------------
      - name: services
        label: "Services & Prices"
        file: "content/services.json"
        description: "The treatment menu, prices, and the featured cards on the home page."
        fields:
          - name: categories
            label: "Service categories"
            label_singular: "category"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Category name", widget: string }
              - { name: sub, label: "Short description", widget: string }
          - name: services
            label: "Services"
            label_singular: "service"
            widget: list
            summary: "{{fields.name}} — {{fields.price}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: tagline, label: "Card tagline (optional)", widget: string, required: false, hint: "Short bold line above the description on the home-page cards." }
              - { name: category, label: "Category", widget: string, hint: "Must match a category name above." }
              - { name: duration, label: "Duration", widget: string, required: false }
              - { name: price, label: "Price", widget: string, required: false }
              - { name: blurb, label: "Short description", widget: text, required: false }
              - { name: desc, label: "Services-menu description", widget: text, required: false }
              - { name: featured, label: "Show as a card on the home page?", widget: boolean, default: false }
              - { name: link, label: "Detail page link (optional)", widget: string, required: false, hint: "e.g. treatment.html?slug=glo2facial" }
              - { name: img, label: "Photo (optional)", widget: image, required: false, choose_url: false }

      # ---- Reviews -----------------------------------------------------------
      - name: reviews
        label: "Reviews"
        file: "content/reviews.json"
        description: "Client testimonials. The first 3 appear on the home page."
        fields:
          - name: reviews
            label: "Reviews"
            label_singular: "review"
            widget: list
            summary: "{{fields.name}} — {{fields.service}}"
            fields:
              - { name: name, label: "Reviewer name", widget: string }
              - { name: service, label: "Treatment", widget: string, required: false }
              - { name: text, label: "Review", widget: text }
              - { name: featured, label: "Use as the big featured quote?", widget: boolean, default: false }

      # ---- Treatment detail pages -------------------------------------------
      - name: treatments
        label: "Treatment Pages"
        file: "content/treatments.json"
        description: "The in-depth 'Learn more' pages."
        fields:
          - name: treatments
            label: "Treatments"
            label_singular: "treatment"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: slug, label: "URL slug (unique; letters & dashes)", widget: string }
              - { name: name, label: "Name", widget: string }
              - { name: tagline, label: "Tagline", widget: string, required: false }
              - { name: price, label: "Price", widget: string, required: false }
              - { name: img, label: "Photo (optional)", widget: image, required: false, choose_url: false }
              - name: facts
                label: "Quick facts"
                widget: object
                required: false
                fields:
                  - { name: duration, label: "Time", widget: string, required: false }
                  - { name: downtime, label: "Downtime", widget: string, required: false }
                  - { name: series, label: "Plan", widget: string, required: false }
                  - { name: bestFor, label: "Best for", widget: string, required: false }
                  - { name: suitableFor, label: "Suitable for", widget: string, required: false }
              - { name: lead, label: "Intro paragraph(s)", widget: text, hint: "Leave a blank line between paragraphs." }
              - name: sections
                label: "Sections"
                label_singular: "section"
                widget: list
                required: false
                summary: "{{fields.h}}"
                fields:
                  - { name: h, label: "Heading", widget: string }
                  - { name: body, label: "Body", widget: markdown, buttons: [bold, italic, link, heading-three, bulleted-list], editor_components: [] }
              - { name: benefitsTitle, label: "Benefits heading (optional)", widget: string, required: false }
              - name: benefits
                label: "Benefits"
                widget: list
                required: false
                field: { name: benefit, label: "Benefit", widget: string }
              - name: closingSections
                label: "Closing sections (optional)"
                label_singular: "section"
                widget: list
                required: false
                summary: "{{fields.h}}"
                fields:
                  - { name: h, label: "Heading", widget: string }
                  - { name: body, label: "Body", widget: markdown, buttons: [bold, italic, link, heading-three, bulleted-list], editor_components: [] }

      # ---- Treatment plans / packages ---------------------------------------
      - name: packages
        label: "Treatment Plans"
        file: "content/packages.json"
        fields:
          - name: packages
            label: "Plans"
            label_singular: "plan"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: tagline, label: "Tagline", widget: string, required: false }
              - { name: forWho, label: "Best for", widget: string, required: false }
              - { name: desc, label: "Description", widget: text, required: false }
              - name: includes
                label: "Includes"
                widget: list
                required: false
                field: { name: item, label: "Item", widget: string }
              - { name: note, label: "Pricing / scheduling note", widget: string, required: false }
              - { name: popular, label: "Show 'Most Popular' ribbon?", widget: boolean, default: false }

      # ---- Blog posts --------------------------------------------------------
      - name: posts
        label: "Blog Posts"
        file: "content/posts.json"
        fields:
          - name: posts
            label: "Posts"
            label_singular: "post"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: slug, label: "URL slug (unique; letters & dashes)", widget: string }
              - { name: title, label: "Title", widget: string }
              - { name: tag, label: "Tag", widget: string, required: false }
              - { name: date, label: "Date", widget: string, required: false }
              - { name: readTime, label: "Read time", widget: string, required: false }
              - { name: excerpt, label: "Excerpt", widget: text, required: false }
              - { name: img, label: "Photo (optional)", widget: image, required: false, choose_url: false }
              - { name: body, label: "Article", widget: markdown, buttons: [bold, italic, link, heading-two, heading-three, bulleted-list, numbered-list], editor_components: [] }

      # ---- FAQ ---------------------------------------------------------------
      - name: faq
        label: "FAQ"
        file: "content/faq.json"
        fields:
          - name: faq
            label: "Questions"
            label_singular: "question"
            widget: list
            summary: "{{fields.q}}"
            fields:
              - { name: q, label: "Question", widget: string }
              - { name: a, label: "Answer", widget: markdown, buttons: [bold, italic, link], editor_components: [] }

      # ---- Photo gallery -----------------------------------------------------
      - name: gallery
        label: "Photo Gallery"
        file: "content/gallery.json"
        fields:
          - name: beforeAfter
            label: "Before / after pairs"
            label_singular: "pair"
            widget: list
            required: false
            summary: "{{fields.treatment}}"
            fields:
              - { name: treatment, label: "Treatment / caption", widget: string }
              - { name: before, label: "Before photo", widget: image, required: false, choose_url: false }
              - { name: after, label: "After photo", widget: image, required: false, choose_url: false }
          - name: gallery
            label: "Photo grid"
            label_singular: "photo"
            widget: list
            required: false
            summary: "{{fields.treatment}}"
            fields:
              - { name: treatment, label: "Caption", widget: string }
              - { name: img, label: "Photo", widget: image, required: false, choose_url: false }
